spring:
  application:
    name: ecommerce

  # ── Kafka ──────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

    consumer:
      group-id: ecommerce-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.queuedockyard.*"

    listener:
      ack-mode: MANUAL_IMMEDIATE

  # ── RabbitMQ ───────────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# ── AWS / LocalStack ───────────────────────────────────────────────
aws:
  endpoint: http://localhost:4566
  region: us-east-1
  credentials:
    access-key: test
    secret-key: test
  sqs:
    invoice-queue-name: invoice-queue
    visibility-timeout: 30
    wait-time-seconds: 5

# ── Custom app properties ──────────────────────────────────────────
app:
  kafka:
    topics:
      orders: ecommerce.order.events       # Inventory + Analytics consume this
  rabbitmq:
    exchange: ecommerce.notifications.exchange   # fanout — email + sms
    queues:
      email: ecommerce.email.queue
      sms: ecommerce.sms.queue

  # ── Redis ──────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      # no password — local dev only
      # in production always set a password

# ── Actuator ───────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # expose all actuator endpoints — restrict in production
        include: health,info,prometheus,metrics
  endpoint:
    health:
      # show full health details including Redis, Kafka, RabbitMQ status
      show-details: always
  metrics:
    tags:
      # this tag is added to every metric from this app
      # makes it easy to filter by app in Prometheus/Grafana
      application: ${spring.application.name}
    distribution:
      # track percentiles for HTTP request duration
      # gives you p50, p95, p99 latency in Grafana
      percentiles-histogram:
        http.server.requests: true

server:
  port: 8088